# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "078d898b50d1d4f076a329449917dc63"
application_url = "https://tiktok-ugc-video-commerce.vercel.app"
embedded = true
name = "Tiktok Video Commerce"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,read_themes,write_themes"

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

[app_proxy]
url = "https://tiktok-ugc-video-commerce.vercel.app/apps/tvc"
prefix = "apps"
subpath = "tvc"

[auth]
redirect_urls = [
  "https://tiktok-ugc-video-commerce.vercel.app/auth/callback",
  "https://tiktok-ugc-video-commerce.vercel.app/auth/shopify/callback",
  "https://tiktok-ugc-video-commerce.vercel.app/api/auth/callback"
]

[build]
automatically_update_urls_on_dev = true
